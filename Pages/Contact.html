<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Contact</title>
        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
        <link rel = "stylesheet" href = "../css/style.css">
    </head>
    <body>
        <div class = "Contact">
            <div id = "Background">
                <header>
                    <h1>Willow's Electrolysis Business</h1>

                    <nav class = "Navigation">
                        <ul>
                            <li><a href = "../index.html">Home</a></li>
                            <li><a href = "About.html">About</a></li>
                            <li><a href = "Contact.html">Contact</a></li>
                            <li><a href = "FAQ.html">FAQ</a></li>
                        </ul>
                    </nav>
                </header>

                <h2>Contact</h2>
                <hr>
                <div class = "ContactMsg">
                    <p>
                        Please feel free to contact me with any questions you may have, or to schedule a consultation.
                    </p>
                </div>

                <div class = "Content">
                    <form action = "/submit-endpoint" method = "POST" class = "Card ContactForm">
                        <div class = "Name">
                            <div class = "Input">
                                <label for = "fstName">First Name:</label>
                                <input type = "text" id = "fstName" name = "fstName" required>
                            </div>
                            <div class = "Input">
                                <label for = "lstName">Last Name:</label>
                                <input type = "text" id = "lstName" name = "lstName" required>
                            </div>
                        </div>
                        <div class = "Input">
                            <label for = "number">Phone Number:</label>
                            <input type = "tel" id = "number" name = "number" pattern = "[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder = "775-453-6781" required>
                        </div>
                        <div class = "Input">
                            <label for = "msg">Message:</label>
                            <textarea id = "msg" name = "msg"  rows="10" cols="45" required></textarea>
                        </div>
                        <button type="submit">Submit</button>
                    </form>
                </div>
            </div>
        </div>

        <footer>
            <div class = "Contact">
                <p>Willow Davis</p>
                <p>(775)842-9154</p>
                <p>email@address.com</p>
            </div>
            <div class = "location">
                <p>1001 Pyramid Way #100, Sparks, NV 89431</p>
            </div>
        </footer>
    </body>
</html>
